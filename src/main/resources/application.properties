# --- PostgreSQL Configuration ---
# Uncomment below and comment out H2 config above to use PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/payrolldb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Mikeville256
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# JPA Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Thymeleaf Configuration
# ============================================
spring.thymeleaf.cache=false

# ============================================
# Logging
# ============================================
logging.level.com.payrolllab=DEBUG
logging.level.org.hibernate.SQL=DEBUG
