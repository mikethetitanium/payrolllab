<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .validation-pass { color: green; font-weight: bold; }
        .validation-fail { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Payroll Reporting Lab</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/reports">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/learning">Learning Mode</a></li>
                    <li class="nav-item"><a class="nav-link" href="/h2-console" target="_blank">H2 Console</a></li>
                </ul>
            </div>
        </nav>
    
    <div class="container mt-4">
        <h1>Report Validation Results</h1>
        <p>Payroll Month: <strong th:text="${payrollMonth}">Month</strong> | Country: <strong th:text="${country}">Country</strong></p>
        
        <table class="table table-bordered mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Check Name</th>
                    <th>Expected Value</th>
                    <th>Actual Value</th>
                    <th>Status</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="result : ${validationResults}">
                    <td th:text="${result.checkName}">Check</td>
                    <td th:text="${#numbers.formatDecimal(result.expectedValue, 0, 'COMMA', 2, 'POINT')}">0.00</td>
                    <td th:text="${#numbers.formatDecimal(result.actualValue, 0, 'COMMA', 2, 'POINT')}">0.00</td>
                    <td>
                        <span th:if="${result.passed}" class="validation-pass">✓ PASS</span>
                        <span th:unless="${result.passed}" class="validation-fail">✗ FAIL</span>
                    </td>
                    <td th:text="${result.message}">Message</td>
                </tr>
            </tbody>
        </table>
        
        <a href="/reports" class="btn btn-secondary">Back to Reports</a>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
