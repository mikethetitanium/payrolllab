<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports - Payroll Reporting Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Payroll Reporting Lab</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/reports">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/learning">Learning Mode</a></li>
                    <li class="nav-item"><a class="nav-link" href="/h2-console" target="_blank">H2 Console</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h1>Available Reports</h1>
        
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="list-group">
                    <a th:each="report : ${reports}" 
                       th:href="@{/reports/{name}(name=${report.rptName})}"
                       class="list-group-item list-group-item-action">
                        <h5 th:text="${report.rptName}">Report Name</h5>
                        <p class="mb-1" th:text="${report.description}">Description</p>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <h3>Report Validation</h3>
            <form action="/reports/validate" method="get" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Payroll Month</label>
                    <input type="text" name="payrollMonth" class="form-control" placeholder="2025-01" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <input type="text" name="country" class="form-control" placeholder="Kenya" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <button type="submit" class="btn btn-primary d-block">Validate Report</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
